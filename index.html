<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Return Interval is a composer-led studio for long-form instrumental worlds in live rooms."
    />
    <title>Return Interval</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="Primary navigation">
      <a class="wordmark" href="#top" aria-label="Return Interval home">RETURN INTERVAL</a>
    </header>

    <main id="top">
      <section class="hero has-image" aria-labelledby="hero-title">
        <img class="hero-image" src="assets/images/hero.jpg" alt="" />
        <div class="hero-fallback" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="hero-shade" aria-hidden="true"></div>
        <div class="hero-content reveal">
          <h1 id="hero-title">Redefining immersive experiences through&nbsp;<strong>music</strong>.</h1>
          <p class="hero-copy">
            <span class="brand-name">Return Interval</span> produces original long-form
            audiovisual experiences with live musicians, electronics, and visuals.
          </p>
          <div class="hero-actions hero-dunes-cta" aria-label="Primary actions">
            <span class="cta-prompt">ENTER OUR<br />FIRST WORLD:</span>
            <a class="button button-primary dunes-button brand-name" href="https://www.youtube.com/watch?v=GPTakZkq2Lw" target="_blank" rel="noopener noreferrer">DUNES</a>
          </div>
        </div>
        <div class="hero-contact" aria-label="Contact">
          <span>CONTACT US</span>
          <a href="mailto:luca@returninterval.com">luca@returninterval.com</a>
          <a href="mailto:ben@returninterval.com">ben@returninterval.com</a>
        </div>

      </section>


    </main>

    <script src="script.js"></script>
  </body>
</html>
